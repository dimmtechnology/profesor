<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero de Salida - Profesores</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; background: #34495e; color: white; padding: 20px; }
        header { text-align: center; border-bottom: 2px solid #1abc9c; margin-bottom: 30px; }
        #lista-alumnos { display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: auto; }
        .tarjeta { 
            background: #ecf0f1; color: #2c3e50; 
            padding: 25px; border-radius: 10px; 
            font-size: 2.2rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: deslizar 0.5s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tarjeta:hover { background: #dcdde1; }
        .btn-borrar { font-size: 1rem; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; }
        
        @keyframes deslizar { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>Alumnos por Salir</h1>
        <p id="reloj"></p>
    </header>

    <main id="lista-alumnos">
        <h2 style="text-align:center; opacity:0.5">Cargando tablero...</h2>
    </main>

    <script>
        // 1. Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBRdSbW4Aj7xgHXPo4hvrYh076Ronc4Xrg",
            authDomain: "guardia-24695.firebaseapp.com",
            databaseURL: "https://guardia-24695-default-rtdb.firebaseio.com/", 
            projectId: "guardia-24695",
            storageBucket: "guardia-24695.firebasestorage.app",
            messagingSenderId: "398247161945",
            appId: "1:398247161945:web:41ee9dc21ba3269d304148",
            measurementId: "G-KP1DQXM8JX"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); 

        // 2. ESCUCHAR LA BASE DE DATOS (Esta es la parte que faltaba)
        db.ref('salidas').on('value', (snapshot) => {
            const container = document.getElementById('lista-alumnos');
            container.innerHTML = ''; // Limpiar pantalla
            
            const datos = snapshot.val();
            
            if (!datos) {
                container.innerHTML = `<h2 style="text-align:center; opacity:0.5">Esperando salidas...</h2>`;
                return;
            }

            // Convertir a lista y ordenar (el más reciente arriba)
            const listaOrdenada = Object.entries(datos).sort((a,b) => b[1].hora - a[1].hora);

            for (let [id, alumno] of listaOrdenada) {
                const div = document.createElement('div');
                div.className = 'tarjeta';
                div.innerHTML = `
                    <span>${alumno.nombreAlumno}</span>
                    <button class="btn-borrar">ENTREGADO</button>
                `;
                
                // Al hacer clic, se borra de la lista (porque el alumno ya salió)
                div.onclick = () => db.ref('salidas/' + id).remove();
                
                container.appendChild(div);
            }
        });

        // Reloj simple
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
